parameters:
    phd_exceptional_validation.translation_domain: '%validator.translation_domain%'

services:
    phd_exceptional_validation.violation_formatter:
        class: PhPhD\ExceptionalValidation\Formatter\Item\Delegating\DelegatingExceptionViolationFormatter
        arguments:
            - !tagged_locator { tag: 'exceptional_validation.violation_formatter', index_by: 'id' }

    phd_exceptional_validation.violation_formatter.default:
        class: PhPhD\ExceptionalValidation\Formatter\Item\DefaultExceptionViolationFormatter
        arguments:
            - '@translator'
            - '%phd_exceptional_validation.translation_domain%'
        tags:
            - { name: 'exceptional_validation.violation_formatter', id: 'default' }

    phd_exceptional_validation.violation_formatter.violation_list_exception:
        class: PhPhD\ExceptionalValidation\Formatter\Item\Validator\ViolationListExceptionFormatter
        tags:
            - { name: 'exceptional_validation.violation_formatter', id: 'PhPhD\ExceptionalValidation\Formatter\Item\Validator\ViolationListExceptionFormatter' }
